name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: gcc-gate
            cc: gcc
            cxx: g++
          - name: clang-gate
            cc: clang-18
            cxx: clang++-18

    env:
      CLANG_FORMAT: clang-format-18
      CLANG_TIDY: clang-tidy-18
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-18 clang-format-18 clang-tidy-18 cppcheck iwyu g++ python3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/dev/_deps
            build/sanitize/_deps
          key: ${{ runner.os }}-${{ matrix.name }}-cmake-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**/*.cmake') }}

      - name: Install npm dependencies
        run: npm ci

      - name: Run repository gate
        run: python3 tools/check_repository.py

  windows-platform:
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure platform test
        run: >
          cmake -S . -B build/windows-platform -G "Visual Studio 17 2022" -A x64
          -DKET_BUILD_TESTS=ON
          -DKET_ENABLE_FORMAT_TARGETS=OFF
          -DKET_ENABLE_STRICT_WARNINGS=ON
          -DKET_WARNINGS_AS_ERRORS=ON

      - name: Build platform test
        run: cmake --build build/windows-platform --config Debug --target ket_platform_test

      - name: Run platform test
        run: ctest --test-dir build/windows-platform -C Debug -R "^KetPlatformTest\\." --output-on-failure
